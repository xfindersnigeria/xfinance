<p style="font-size:16px;color:#333;margin:0 0 16px 0;">Hi {{name}},</p>
<p style="font-size:15px;color:#555;margin:0 0 24px 0;">
  We received a request to reset your password. Use the OTP code below to proceed.
  This code is valid for <strong>10 minutes</strong>.
</p>
<div style="text-align:center;margin:32px 0;">
  <div style="display:inline-block;background:#f0f4ff;border:2px dashed #4f6ef7;border-radius:12px;padding:20px 40px;">
    <span style="font-size:36px;font-weight:700;letter-spacing:12px;color:#2d3a7b;">{{otp}}</span>
  </div>
</div>
<p style="font-size:13px;color:#888;margin:0 0 8px 0;">
  If you did not request a password reset, please ignore this email or contact support if you have concerns.
</p>
<p style="font-size:13px;color:#888;margin:0;">
  For security, never share this code with anyone.
</p>
